version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: personalmind_postgres
    environment:
      POSTGRES_USER: personalmind
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: personalmind
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: personalmind_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  chromadb:
    image: chromadb/chroma:latest
    container_name: personalmind_chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: personalmind_backend
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DATABASE_URL: postgresql://personalmind:secure_password@postgres:5432/personalmind
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    ports:
      - "8001:8000"
    depends_on:
      - postgres
      - redis
      - chromadb
    volumes:
      - ./storage:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: personalmind_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001
    depends_on:
      - backend

  telegram_bot:
    build:
      context: ./telegram-bot
      dockerfile: Dockerfile
    container_name: personalmind_bot
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  chroma_data:
